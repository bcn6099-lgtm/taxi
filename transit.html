<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mini GPS Tiempo Real</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

  <style>
    /* Estilos originales */
    body { margin:0; font-family: Arial, sans-serif; background:#000; color:#fff;}
    #map { position:absolute; top:0; bottom:0; width:100%; }

    .panel {
      position:absolute;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.9);
      padding:15px;
      border-top:1px solid #222;
    }

    .title {
      color:#FFC300;
      font-size:14px;
      margin-bottom:5px;
    }

    .route {
      font-size:18px;
      margin-bottom:5px;
    }

    .alt {
      color:#888;
      font-size:14px;
    }

    .hint {
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.7);
      padding:6px 12px;
      border-radius:4px;
      font-size:12px;
      color:#FFC300;
    }

    /* Nuevos estilos para el menú de configuración */
    .hamburger {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      color: #FFC300;
      cursor: pointer;
      z-index: 10;
      background: rgba(0,0,0,0.7);
      padding: 5px 10px;
      border-radius: 4px;
      user-select: none;
    }

    .settings-panel {
      display: none;
      position: absolute;
      top: 55px;
      right: 15px;
      background: rgba(0,0,0,0.9);
      padding: 15px;
      border: 1px solid #222;
      border-radius: 4px;
      z-index: 10;
    }

    .settings-panel h3 {
      margin-top: 0;
      color: #FFC300;
      font-size: 14px;
    }

    .settings-panel input {
      width: 220px;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
      background: #222;
      border: 1px solid #555;
      color: #fff;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .settings-panel button {
      background: #FFC300;
      color: #000;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 4px;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>
<div class="hint">Pulsa en el mapa</div>

<div class="hamburger" id="hamburger">&#9776;</div>
<div class="settings-panel" id="settings-panel">
  <h3>Configuración de API</h3>
  <label for="api-key" style="font-size: 12px;">Mapbox Access Token:</label><br>
  <input type="text" id="api-key" placeholder="pk.eyJ1..." />
  <button id="save-key">Guardar e Iniciar</button>
</div>

<div class="panel" id="info">
  <div class="title">RUTA ÓPTIMA</div>
  <div class="route" id="best">--</div>
  <div class="alt" id="alt">--</div>
</div>

<script>
let map = null;
let userLocation = null;
let routeIds = [];

// Elementos del DOM para la configuración
const hamburger = document.getElementById('hamburger');
const settingsPanel = document.getElementById('settings-panel');
const apiKeyInput = document.getElementById('api-key');
const saveKeyBtn = document.getElementById('save-key');

// Abrir/cerrar panel de configuración
hamburger.addEventListener('click', () => {
  settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
});

// Guardar clave e inicializar mapa
saveKeyBtn.addEventListener('click', () => {
  const key = apiKeyInput.value.trim();
  if (key) {
    localStorage.setItem('mapbox_key', key);
    settingsPanel.style.display = 'none';
    initMap(key);
  } else {
    alert("Por favor, introduce una clave API válida.");
  }
});

// Comprobar si ya hay una clave guardada al cargar la página
const savedKey = localStorage.getItem('mapbox_key');
if (savedKey) {
  apiKeyInput.value = savedKey;
  initMap(savedKey); // Iniciar directamente si hay clave
} else {
  // Si no hay clave, forzamos a que se abra el panel
  settingsPanel.style.display = 'block';
}

// Función principal encapsulada
function initMap(token) {
  if (map) return; // Evitar inicializar dos veces

  mapboxgl.accessToken = token;

  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [2.1734, 41.3851], // Barcelona por defecto
    zoom: 14
  });

  // Obtener ubicación
  navigator.geolocation.getCurrentPosition(pos => {
    userLocation = [pos.coords.longitude, pos.coords.latitude];

    new mapboxgl.Marker({color:"#FFC300"})
      .setLngLat(userLocation)
      .addTo(map);

    map.setCenter(userLocation);
  }, err => {
    console.error("Error obteniendo ubicación:", err);
  });

  // Click → calcular rutas
  map.on('click', (e) => {
    if (!userLocation) {
      alert("Aún no se ha detectado tu ubicación.");
      return;
    }

    const dest = [e.lngLat.lng, e.lngLat.lat];

    // limpiar rutas anteriores
    routeIds.forEach(id => {
      if (map.getLayer(id)) map.removeLayer(id);
      if (map.getSource(id)) map.removeSource(id);
    });
    routeIds = [];

    fetch(`https://api.mapbox.com/directions/v5/mapbox/driving-traffic/${userLocation[0]},${userLocation[1]};${dest[0]},${dest[1]}?alternatives=true&geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`)
      .then(res => res.json())
      .then(data => {

        const routes = data.routes;
        if (!routes || routes.length === 0) return;

        // ordenar por tiempo (CLAVE)
        routes.sort((a, b) => a.duration - b.duration);

        const best = routes[0];
        const alt = routes[1];

        // dibujar rutas
        routes.forEach((r, i) => {
          const id = 'route' + i;

          map.addSource(id, {
            type: 'geojson',
            data: {
              type: 'Feature',
              geometry: r.geometry
            }
          });

          map.addLayer({
            id: id,
            type: 'line',
            source: id,
            layout: {
              'line-join': 'round',
              'line-cap': 'round'
            },
            paint: {
              'line-color': i === 0 ? '#FFC300' : '#555',
              'line-width': i === 0 ? 6 : 4
            }
          });

          routeIds.push(id);
        });

        // mostrar info
        document.getElementById("best").innerText =
          `${Math.round(best.duration/60)} min | ${Math.round(best.distance/1000*10)/10} km`;

        if (alt) {
          document.getElementById("alt").innerText =
            `Alternativa: ${Math.round(alt.duration/60)} min`;
        }
      })
      .catch(err => {
        console.error("Error calculando ruta:", err);
        alert("Error al calcular la ruta. Comprueba que tu API Key sea válida.");
      });
  });
}
</script>

</body>
</html>
