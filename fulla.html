<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturació Taxi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Favicon -->
<link rel="icon" type="image/png" href="taxi_ico2.png">

<!-- Android / Chrome -->
<link rel="icon" href="taxi_ico2.png">
<meta name="theme-color" content="#ffc107">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #1a1a1a;
            --bg-card: #2a2a2a;
            --accent: #ffc107;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border: #404040;
            --color-green: #4caf50;
            --color-red: #ff4444;
            --color-yellow: #ffc107;
            --color-magenta: #7FFF00;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 1.5rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
        }

        .sidebar-menu {
            padding: 1rem 0;
        }

        .menu-item {
            padding: 0.875rem 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-weight: 500;
        }

        .menu-item:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .menu-item.active {
            background: var(--bg-card);
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .menu-item.danger {
            color: var(--color-red);
        }

        .menu-item.danger:hover {
            background: rgba(255, 68, 68, 0.1);
            color: var(--color-red);
            border-left-color: var(--color-red);
        }

        .menu-divider {
            height: 1px;
            background: var(--border);
            margin: 0.5rem 0;
        }

        .menu-toggle {
            position: fixed;
            top: 1rem;
            left: 1rem;
            width: 40px;
            height: 40px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 4px;
        }

        .menu-toggle span {
            width: 20px;
            height: 2px;
            background: var(--bg-primary);
            transition: all 0.3s;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .main-content {
            margin-left: 0;
            padding: 1rem;
            padding-top: 4rem;
            min-height: 100vh;
        }

        @media (min-width: 768px) {
            .main-content {
                padding: 2rem;
                padding-top: 2rem;
            }
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--accent);
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .stat-change {
            font-size: 0.75rem;
            margin-top: 2px;
        }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .chart-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .section-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-input, .form-textarea, select {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .form-input:focus, .form-textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: #e6b000;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
        }

        .btn-danger {
            background: var(--color-red);
            color: white;
        }

        .btn-danger:hover {
            background: #cc0000;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-secondary);
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        tbody tr:hover {
            background: rgba(255, 193, 7, 0.05);
        }

        .action-btn {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
            margin-right: 0.5rem;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
        }

        .modal-close, .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
        }

        .modal-close:hover, .close-btn:hover {
            color: var(--text-primary);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid var(--color-green);
            color: var(--color-green);
        }

        .alert-error {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid var(--color-red);
            color: var(--color-red);
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 1rem;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .calendar-day-header {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding: 0.5rem;
            font-weight: 600;
        }

        .calendar-day {
            aspect-ratio: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .calendar-day:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .calendar-day.has-data {
            background: rgba(255, 193, 7, 0.1);
        }

        .calendar-day-number {
            font-size: 0.75rem;
            font-weight: 600;
            position: absolute;
            top: 0.25rem;
            left: 0.5rem;
        }

        .calendar-day-amount {
            font-size: 1.1rem;
            color: var(--accent);
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
        }

        .calendar-month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .calendar-month-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .calendar-nav-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .calendar-nav-btn:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        .filters {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .filters label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .filters select {
            flex: 1;
            min-width: 200px;
        }

        .view-selector {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.5rem;
        }

        .view-btn {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
        }

        .view-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .view-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        /* ── Dashboard filters row ── */
        .filters-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            width: 100%;
        }

        /* ── Month drum spinner ── */
        .month-spinner {
            position: relative;
            height: 72px;
            overflow: hidden;
            cursor: ns-resize;
            user-select: none;
            touch-action: none;
            min-width: 180px;
            max-width: 260px;
        }
        .month-spinner::before,
        .month-spinner::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 22px;
            z-index: 2;
            pointer-events: none;
        }
        .month-spinner::before {
            top: 0;
            background: linear-gradient(to bottom, var(--bg-card), transparent);
        }
        .month-spinner::after {
            bottom: 0;
            background: linear-gradient(to top, var(--bg-card), transparent);
        }
        .month-spinner-track {
            position: absolute;
            width: 100%;
            transition: transform 0.15s ease-out;
        }
        .month-spinner-item {
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color 0.15s, font-size 0.15s;
            white-space: nowrap;
        }
        .month-spinner-item.selected {
            color: var(--accent);
            font-size: 1.25rem;
            font-weight: 700;
        }
        .month-spinner-item.adj {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ── Days number display ── */
        .days-display {
            display: flex;
            align-items: baseline;
            gap: 0.3rem;
            flex-shrink: 0;
        }
        .days-display-label {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.03em;
            line-height: 1;
        }
        .days-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
            line-height: 1;
            transition: color 0.15s;
            min-width: 2.5ch;
            text-align: center;
        }
        .days-number:hover { color: var(--text-primary); }
        .days-edit-input {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--accent);
            outline: none;
            width: 3ch;
            text-align: center;
            font-family: inherit;
            line-height: 1;
            padding: 0;
        }

        .range-slider-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .range-slider-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: block;
        }

        .range-slider-inputs {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .range-input {
            flex: 1;
            min-width: 150px;
        }

        .range-input label {
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
            display: block;
            color: var(--text-secondary);
        }

        .observation-alert {
            color: var(--color-yellow);
            font-weight: 700;
            margin-right: 0.25rem;
            font-size: 1.1em;
            vertical-align: middle;
        }

        .revenue-amount {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .weekday-abbr {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
