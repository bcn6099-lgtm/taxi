<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vuelos BCN</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
}

.container{
    padding:10px;
}

.terminal-header,.table-row{
    display:grid;
    grid-template-columns:80px 1fr 1fr 1fr;
    text-align:center;
    padding:6px 0;
}

.terminal-header{
    font-weight:bold;
    border-bottom:1px solid #444;
}

.table-row{
    border-bottom:1px solid #222;
}

button{
    margin:5px;
    padding:10px;
    font-size:16px;
}

.footer{
    color:#ccc;
    font-size:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container" id="capture">

    <div style="margin-bottom:10px;">
        <button onclick="loadFlights()">Actualizar</button>
        <button onclick="shareWhatsApp()">Compartir</button>
    </div>

    <div id="table"></div>

    <div class="footer" id="footer">
        Datos de llegadas en tiempo real.<br>
        Puede haber pequeñas desviaciones por retrasos o datos incompletos de la API.<br>
        EasyJet separado en T2C.<br>
        Última actualización: <span id="time"></span>
    </div>

    <div id="debug" class="footer"></div>

</div>

<script>

const API_KEY = "TU_API_KEY";

let currentTimeSlots = [];
let lastProcessedData = [];

// ===== UTIL =====
function getLocalHHMM(date){
    return date.toLocaleTimeString('es-ES',{
        hour:'2-digit',
        minute:'2-digit',
        hour12:false
    });
}

// ===== EASYJET =====
function isEasyJet(f){
    const name = f.airline?.name?.toLowerCase() || '';
    const iata = f.airline?.iata || '';
    return name.includes('easyjet') || iata === 'U2';
}

// ===== DEDUP =====
function removeCodeshareDuplicates(flights){
    const map=new Map();

    flights.forEach(f=>{
        try{
            const origin=f.movement?.airport?.iata || 'XXX';
            const time=f.movement?.scheduledTime?.local;

            if(!time) return;

            const d=new Date(time);
            if(isNaN(d)) return;

            d.setSeconds(0,0);

            const key=origin+'_'+d.getTime();

            if(!map.has(key)){
                map.set(key,f);
            }
        }catch{}
    });

    return Array.from(map.values());
}

// ===== TERMINAL =====
function extractTerminal(f){
    const t = f.movement?.terminal || '';
    if(t.includes('1')) return 't1';
    return 't2';
}

// ===== TIME SLOTS =====
function generateTimeSlots(){
    const now = new Date();
    now.setMinutes(0,0,0);

    currentTimeSlots=[];

    for(let i=0;i<8;i++){
        let d=new Date(now);
        d.setHours(now.getHours()+i);
        currentTimeSlots.push(getLocalHHMM(d));
    }
}

// ===== LOAD =====
async function loadFlights(){

    document.getElementById('debug').innerText='Cargando...';

    try{

        generateTimeSlots();

        const now = new Date();
        const end = new Date();
        end.setHours(end.getHours()+8);

        const url = `https://aerodatabox.p.rapidapi.com/flights/airports/iata/BCN/${now.toISOString()}/${end.toISOString()}`;

        const res = await fetch(url,{
            headers:{
                "X-RapidAPI-Key":API_KEY,
                "X-RapidAPI-Host":"aerodatabox.p.rapidapi.com"
            }
        });

        if(!res.ok){
            throw new Error("HTTP "+res.status);
        }

        const data = await res.json();

        // 💾 guardar cache
        localStorage.setItem("flights_cache", JSON.stringify({
            time: Date.now(),
            data: data.arrivals
        }));

        display(data.arrivals);

        document.getElementById('debug').innerText=
            `OK API (${data.arrivals.length} vuelos)`;

    }catch(e){

        const cache = localStorage.getItem("flights_cache");

        if(cache){
            const parsed = JSON.parse(cache);

            display(parsed.data,true);

            document.getElementById('debug').innerText =
                `ERROR API (${e.message}) → usando cache (${Math.round((Date.now()-parsed.time)/60000)} min)`;
        }else{
            document.getElementById('debug').innerText=
                'ERROR: '+e.message;
        }
    }
}

// ===== DISPLAY =====
function display(flights, fromCache=false){

    flights = removeCodeshareDuplicates(flights);
    lastProcessedData = flights;

    const slots={};
    currentTimeSlots.forEach(s=>slots[s]={t1:0,t2:0,t2c:0});

    flights.forEach(f=>{
        try{
            const time = f.movement?.scheduledTime?.local;
            if(!time) return;

            const d = new Date(time);
            if(isNaN(d)) return;

            const key = getLocalHHMM(d);

            if(slots[key]){

                if(isEasyJet(f)){
                    slots[key].t2c++;
                }else{
                    slots[key][extractTerminal(f)]++;
                }

            }

        }catch{}
    });

    let html='<div class="terminal-header"><div>🕐</div><div>T1</div><div>T2</div><div>T2C</div></div>';

    currentTimeSlots.forEach(s=>{
        html+=`<div class="table-row">
        <div>${s}</div>
        <div>${slots[s].t1}</div>
        <div>${slots[s].t2}</div>
        <div>${slots[s].t2c}</div>
        </div>`;
    });

    document.getElementById('table').innerHTML=html;

    document.getElementById('time').innerText =
        new Date().toLocaleTimeString() + (fromCache ? ' (cache)' : '');
}

// ===== SHARE =====
async function shareWhatsApp(){

    const element = document.getElementById("capture");

    const canvas = await html2canvas(element,{
        backgroundColor:"#000"
    });

    const blob = await new Promise(resolve=>canvas.toBlob(resolve,"image/jpeg",0.9));

    const file = new File([blob],"vuelos.jpg",{type:"image/jpeg"});

    if(navigator.share){
        try{
            await navigator.share({
                files:[file],
                title:"Vuelos BCN"
            });
        }catch(e){
            alert("No se pudo compartir");
        }
    }else{
        alert("Tu navegador no soporta compartir archivos");
    }
}

// AUTO LOAD
loadFlights();

</script>

</body>
</html>
