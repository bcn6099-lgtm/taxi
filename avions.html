<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCN ARRIBADES</title>

<link rel="icon" type="image/png" href="avions.png">
<link rel="apple-touch-icon" href="avions.png">
<meta name="theme-color" content="#ffc107">

<link rel="stylesheet" href="style2.css">
</head>

<body>
<div class="container">

<div class="header-block">
    <div class="top-bar">
        <div class="config-icon" id="configBtn">⚙️</div>
    </div>

    <h1>✈ BCN ARRIBADES</h1>
    <div class="current-time" id="currentTime">--:--</div>
</div>

<div class="config-panel" id="configPanel">
    <input type="text" id="apiKeyInput" placeholder="RapidAPI Key">

    <div class="config-buttons">
        <button class="primary-button" id="loadFlightsBtn">CARGAR VUELOS</button>
        <button class="secondary-button" id="testApiBtn">PROBAR API</button>
        <button class="secondary-button" id="clearCacheBtn">LIMPIAR CACHÉ</button>
        <button class="secondary-button" id="debugBtn">DEBUG</button>
    </div>

    <div class="status-message" id="apiStatus">
        Introduce tu API Key
    </div>

    <div id="debugPanel" class="debug-info" style="display:none;"></div>
</div>

<div class="stats-bar" id="statsBar" style="display:none;">
    <span class="cache-badge" id="cacheBadge" style="display:none;">📦 CACHÉ</span>
</div>

<div id="flightsContainer">
    <div class="empty-state">
        <p>⏳ Cargando vuelos...</p>
    </div>
</div>

<div class="footer">
    <p id="cacheInfo" style="font-size:10px; color:#aaaaaa;"></p>
</div>

</div>

<script>
(function(){

const configBtn = document.getElementById('configBtn');
const configPanel = document.getElementById('configPanel');
const apiKeyInput = document.getElementById('apiKeyInput');
const loadBtn = document.getElementById('loadFlightsBtn');
const testBtn = document.getElementById('testApiBtn');
const clearCacheBtn = document.getElementById('clearCacheBtn');
const debugBtn = document.getElementById('debugBtn');
const apiStatus = document.getElementById('apiStatus');
const statsBar = document.getElementById('statsBar');
const flightsContainer = document.getElementById('flightsContainer');
const cacheBadge = document.getElementById('cacheBadge');
const cacheInfo = document.getElementById('cacheInfo');
const debugPanel = document.getElementById('debugPanel');
const currentTimeEl = document.getElementById('currentTime');

const RAPIDAPI_HOST = 'aerodatabox.p.rapidapi.com';
const CACHE_KEY = 'aerodatabox_flights_cache';
const CACHE_DURATION = 5 * 60 * 1000;

let lastRawData = null;
let lastProcessedData = null;
let currentTimeSlots = [];

configBtn.onclick = () => configPanel.classList.toggle('visible');

function updateCurrentTime(){
    const d=new Date();
    currentTimeEl.textContent=d.toTimeString().slice(0,5);
}
setInterval(updateCurrentTime,60000);
updateCurrentTime();

function formatDateTimeForAPI(date){
    return date.toISOString().slice(0,19)+'Z';
}

function generateTimeSlots(){
    const now=new Date();
    let h=now.getHours();
    let arr=[];
    for(let i=0;i<=10;i++){
        arr.push(((h+i)%24).toString().padStart(2,'0')+':00');
    }
    currentTimeSlots=arr;
}
generateTimeSlots();

function saveCache(data){
    localStorage.setItem(CACHE_KEY,JSON.stringify({
        t:Date.now(),
        d:data,
        slots:currentTimeSlots
    }));
}

function getCache(){
    let c=localStorage.getItem(CACHE_KEY);
    if(!c) return null;
    try{
        let j=JSON.parse(c);
        if(Date.now()-j.t<CACHE_DURATION){
            currentTimeSlots=j.slots;
            return j.d;
        }
    }catch{}
    return null;
}

function updateCacheInfo(){
    let c=getCache();
    if(!c){ cacheInfo.textContent=''; return;}
    let raw=JSON.parse(localStorage.getItem(CACHE_KEY));
    let m=Math.round((CACHE_DURATION-(Date.now()-raw.t))/60000);
    cacheInfo.textContent=m>0?`CACHÉ EXPIRA EN ${m} MIN`:'';
}
setInterval(updateCacheInfo,60000);

function extractHour(f){
    try{
        return new Date(f.movement.scheduledTime.local||f.movement.scheduledTime).getHours();
    }catch{return null;}
}

function extractTerminal(f){
    return (f.movement.terminal||'1').toString().includes('2')?'t2':'t1';
}

/* ✅ FILTRO CODESHARE RESTAURADO */
function removeCodeshareDuplicates(flights){
    if(!flights || flights.length===0) return [];

    const map=new Map();

    flights.forEach(f=>{
        try{
            const origin=f.movement?.airport?.iata || 'XXX';
            const time=f.movement?.scheduledTime?.local || f.movement?.scheduledTime;

            if(!time) return;

            const d=new Date(time);
            if(isNaN(d)) return;

            d.setSeconds(0,0);

            const key=origin+'_'+d.getTime();

            if(!map.has(key)){
                map.set(key,f);
            }
        }catch{}
    });

    return Array.from(map.values());
}

function display(flights,fromCache=false){

    /* 🔥 AQUI ESTÁ EL FIX */
    flights = removeCodeshareDuplicates(flights);
    lastProcessedData = flights;

    if(!flights.length){
        flightsContainer.innerHTML='<p>No hay datos</p>';
        return;
    }

    let slots={};
    currentTimeSlots.forEach(s=>slots[s]={t1:0,t2:0});

    flights.forEach(f=>{
        let h=extractHour(f);
        if(h===null) return;
        let key=h.toString().padStart(2,'0')+':00';
        if(slots[key]){
            slots[key][extractTerminal(f)]++;
        }
    });

    let html='<div class="terminal-header"><div>🕐</div><div>T1</div><div>T2</div></div>';

    currentTimeSlots.forEach(s=>{
        html+=`<div class="table-row">
        <div>${s}</div>
        <div>${slots[s].t1}</div>
        <div>${slots[s].t2}</div>
        </div>`;
    });

    flightsContainer.innerHTML=html;

    statsBar.style.display='flex';
    cacheBadge.style.display=fromCache?'inline-block':'none';
}

async function loadFlights(){
    const key=apiKeyInput.value.trim();
    if(!key){ apiStatus.textContent='❌ API Key'; return;}

    try{
        let now=new Date();
        let later=new Date(now.getTime()+10*60*60*1000);

        let from=formatDateTimeForAPI(now);
        let to=formatDateTimeForAPI(later);

        let url=`https://aerodatabox.p.rapidapi.com/flights/airports/iata/BCN/${encodeURIComponent(from)}/${encodeURIComponent(to)}?direction=Arrival`;

        let r=await fetch(url,{
            headers:{
                'X-RapidAPI-Key':key,
                'X-RapidAPI-Host':RAPIDAPI_HOST
            }
        });

        if(!r.ok) throw new Error(r.status);

        let d=await r.json();
        let arr=d.arrivals||d;

        lastRawData=arr;

        generateTimeSlots();
        saveCache(arr);
        display(arr);

        apiStatus.textContent='✅ OK';
        configPanel.classList.remove('visible');

    }catch(e){
        apiStatus.textContent='❌ '+e.message;
    }
}

function showDebug(){
    let txt='=== DEBUG ===\n\n';

    if(lastRawData){
        txt+='TOTAL API:'+lastRawData.length+'\n';
    }
    if(lastProcessedData){
        txt+='TRAS FILTRO:'+lastProcessedData.length+'\n\n';
    }

    txt+='FROM:'+formatDateTimeForAPI(new Date())+'\n';
    txt+='TO:'+formatDateTimeForAPI(new Date(Date.now()+10*60*60*1000))+'\n\n';

    if(lastRawData){
        txt+=JSON.stringify(lastRawData.slice(0,2),null,2);
    }

    debugPanel.textContent=txt;
    debugPanel.style.display='block';
}

function clearCache(){
    localStorage.removeItem(CACHE_KEY);
    location.reload();
}

async function testApi(){
    const key=apiKeyInput.value.trim();
    if(!key){ apiStatus.textContent='❌ API Key'; return;}

    try{
        let now=new Date();
        let later=new Date(now.getTime()+3600000);

        let url=`https://aerodatabox.p.rapidapi.com/flights/airports/iata/BCN/${encodeURIComponent(formatDateTimeForAPI(now))}/${encodeURIComponent(formatDateTimeForAPI(later))}?direction=Arrival`;

        let r=await fetch(url,{
            headers:{
                'X-RapidAPI-Key':key,
                'X-RapidAPI-Host':RAPIDAPI_HOST
            }
        });

        if(!r.ok) throw new Error(r.status);

        apiStatus.textContent='✅ API OK';

    }catch(e){
        apiStatus.textContent='❌ '+e.message;
    }
}

loadBtn.onclick=loadFlights;
testBtn.onclick=testApi;
clearCacheBtn.onclick=clearCache;
debugBtn.onclick=showDebug;

function init(){
    let key=localStorage.getItem('aerodatabox_key');
    if(key) apiKeyInput.value=key;

    let cache=getCache();

    if(cache){
        display(cache,true);
        apiStatus.textContent='📦 Caché';
    }else if(key){
        loadFlights();
    }
}

init();

})();
</script>

</body>
</html>
