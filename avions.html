<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCN ARRIBADES</title>
    
    <link rel="icon" type="image/png" href="avions.png">
    <link rel="apple-touch-icon" href="avions.png">
    <meta name="theme-color" content="#ffc107">
    
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <div class="header-block">
        <div class="top-bar">
            <div class="config-icon" id="configBtn" title="Configuración">⚙️</div>
        </div>
        
        <h1>✈ BCN ARRIBADES</h1>
        <div class="current-time" id="currentTime">20:13</div>
        </div>
        
        <div class="config-panel" id="configPanel">
            <input type="text" id="apiKeyInput" placeholder="RapidAPI Key" value="">
            <div class="config-buttons">
                <button class="primary-button" id="loadFlightsBtn">CARGAR VUELOS</button>
                <button class="secondary-button" id="testApiBtn">PROBAR API</button>
                <button class="secondary-button" id="clearCacheBtn">LIMPIAR CACHÉ</button>
                <button class="secondary-button" id="debugBtn">DEBUG</button>
            </div>
            <div class="status-message" id="apiStatus">
                Introduce tu API Key en configuración
            </div>
            <div id="debugPanel" class="debug-info" style="display: none;"></div>
        </div>
        
        <div class="stats-bar" id="statsBar" style="display: none;">
            <span class="cache-badge" id="cacheBadge" style="display: none;">📦 CACHÉ</span>
        </div>
        
        <div id="flightsContainer">
            <div class="empty-state" id="emptyState">
                <p>✈ Carga los datos para ver el split de terminales</p>
            </div>
        </div>
        
        <div class="footer">
            <p id="cacheInfo" style="font-size: 10px; color: #333333;"></p>
        </div>
    </div>
    
<script>
(function() {

const configBtn = document.getElementById('configBtn');
const configPanel = document.getElementById('configPanel');
const apiKeyInput = document.getElementById('apiKeyInput');
const loadBtn = document.getElementById('loadFlightsBtn');
const testBtn = document.getElementById('testApiBtn');
const clearCacheBtn = document.getElementById('clearCacheBtn');
const debugBtn = document.getElementById('debugBtn');
const apiStatus = document.getElementById('apiStatus');
const statsBar = document.getElementById('statsBar');
const flightsContainer = document.getElementById('flightsContainer');
const emptyState = document.getElementById('emptyState');
const cacheBadge = document.getElementById('cacheBadge');
const cacheInfo = document.getElementById('cacheInfo');
const debugPanel = document.getElementById('debugPanel');
const currentTimeEl = document.getElementById('currentTime');

const RAPIDAPI_HOST = 'aerodatabox.p.rapidapi.com';
const AIRPORT = 'BCN';

configBtn.addEventListener('click', () => {
    configPanel.classList.toggle('visible');
});

function updateCurrentTime() {
    const ahora = new Date();
    currentTimeEl.textContent = ahora.toLocaleTimeString().slice(0,5);
}
setInterval(updateCurrentTime, 60000);
updateCurrentTime();

function formatDateForAPI(date) {
    return date.toISOString().split('T')[0];
}

// ✅ CORREGIDO
function formatTimeForAPI(date) {
    return date.toTimeString().split(' ')[0];
}

// ✅ CORREGIDO
function buildUrl(fromLocal, toLocal) {
    return `https://aerodatabox.p.rapidapi.com/flights/airports/iata/${AIRPORT}?fromLocal=${encodeURIComponent(fromLocal)}&toLocal=${encodeURIComponent(toLocal)}`;
}

async function testApiKey() {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) {
        apiStatus.textContent = '❌ Introduce API Key';
        return;
    }

    const ahora = new Date();
    const dentro1h = new Date(ahora.getTime() + 3600000);

    const fromLocal = `${formatDateForAPI(ahora)}T${formatTimeForAPI(ahora)}`;
    const toLocal = `${formatDateForAPI(dentro1h)}T${formatTimeForAPI(dentro1h)}`;

    const url = buildUrl(fromLocal, toLocal);

    try {
        const response = await fetch(url, {
            headers: {
                'X-RapidAPI-Key': apiKey,
                'X-RapidAPI-Host': RAPIDAPI_HOST
            }
        });

        if (!response.ok) throw new Error(`Error ${response.status}`);

        apiStatus.textContent = '✅ API Key válida';

    } catch (error) {
        apiStatus.textContent = `❌ ${error.message}`;
    }
}

async function loadFlights() {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) {
        apiStatus.textContent = '❌ Introduce API Key';
        return;
    }

    const ahora = new Date();
    const dentro10h = new Date(ahora.getTime() + 10 * 3600000);

    const fromLocal = `${formatDateForAPI(ahora)}T${formatTimeForAPI(ahora)}`;
    const toLocal = `${formatDateForAPI(dentro10h)}T${formatTimeForAPI(dentro10h)}`;

    const url = buildUrl(fromLocal, toLocal);

    try {
        const response = await fetch(url, {
            headers: {
                'X-RapidAPI-Key': apiKey,
                'X-RapidAPI-Host': RAPIDAPI_HOST
            }
        });

        if (!response.ok) throw new Error(`Error ${response.status}`);

        const data = await response.json();
        const arrivals = data.arrivals || data;

        flightsContainer.innerHTML = `<pre>${JSON.stringify(arrivals.slice(0,10), null, 2)}</pre>`;

        apiStatus.textContent = '✅ Datos cargados';

    } catch (error) {
        apiStatus.textContent = `❌ ${error.message}`;
    }
}

loadBtn.addEventListener('click', loadFlights);
testBtn.addEventListener('click', testApiKey);

})();
</script>

</body>
</html>
