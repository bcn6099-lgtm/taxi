<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCN ARRIBADES</title>

    <link rel="icon" type="image/png" href="avions.png">
    <link rel="apple-touch-icon" href="avions.png">
    <meta name="theme-color" content="#ffc107">

    <link rel="stylesheet" href="style2.css">
</head>
<body>
<div class="container">

    <div class="header-block">
        <div class="top-bar">
            <div class="config-icon" id="configBtn">⚙️</div>
        </div>

        <h1>✈ BCN ARRIBADES</h1>
        <div id="currentTime"></div>
    </div>

    <div class="config-panel" id="configPanel">
        <input type="text" id="apiKeyInput" placeholder="RapidAPI Key">

        <button id="loadFlightsBtn">CARGAR VUELOS</button>
        <button id="testApiBtn">PROBAR API</button>

        <div id="apiStatus"></div>
    </div>

    <div id="flightsContainer"></div>

</div>

<script>
(function(){

const AIRPORT = 'BCN';
const RAPIDAPI_HOST = 'aerodatabox.p.rapidapi.com';

const apiKeyInput = document.getElementById('apiKeyInput');
const loadBtn = document.getElementById('loadFlightsBtn');
const testBtn = document.getElementById('testApiBtn');
const apiStatus = document.getElementById('apiStatus');
const flightsContainer = document.getElementById('flightsContainer');
const currentTimeEl = document.getElementById('currentTime');

function updateTime(){
    const now = new Date();
    currentTimeEl.textContent = now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

function formatDate(date){
    return date.toISOString().split('T')[0];
}

// ✅ CORREGIDO → ahora devuelve HH:MM:SS
function formatTime(date){
    return date.toTimeString().split(' ')[0];
}

// ✅ CORREGIDO → endpoint con query params
function buildUrl(fromLocal, toLocal){
    return `https://aerodatabox.p.rapidapi.com/flights/airports/iata/${AIRPORT}?fromLocal=${encodeURIComponent(fromLocal)}&toLocal=${encodeURIComponent(toLocal)}`;
}

async function testApi(){

    const apiKey = apiKeyInput.value.trim();
    if(!apiKey){
        apiStatus.textContent = '❌ Introduce API Key';
        return;
    }

    const now = new Date();
    const plus1h = new Date(now.getTime() + 3600000);

    const fromLocal = `${formatDate(now)}T${formatTime(now)}`;
    const toLocal = `${formatDate(plus1h)}T${formatTime(plus1h)}`;

    const url = buildUrl(fromLocal, toLocal);

    try{

        const res = await fetch(url,{
            headers:{
                'X-RapidAPI-Key': apiKey,
                'X-RapidAPI-Host': RAPIDAPI_HOST
            }
        });

        if(!res.ok){
            throw new Error(`Error ${res.status}`);
        }

        apiStatus.textContent = '✅ API OK';

    }catch(e){
        apiStatus.textContent = '❌ ' + e.message;
    }
}

async function loadFlights(){

    const apiKey = apiKeyInput.value.trim();
    if(!apiKey){
        apiStatus.textContent = '❌ Introduce API Key';
        return;
    }

    const now = new Date();
    const plus10h = new Date(now.getTime() + 10*3600000);

    const fromLocal = `${formatDate(now)}T${formatTime(now)}`;
    const toLocal = `${formatDate(plus10h)}T${formatTime(plus10h)}`;

    const url = buildUrl(fromLocal, toLocal);

    try{

        const res = await fetch(url,{
            headers:{
                'X-RapidAPI-Key': apiKey,
                'X-RapidAPI-Host': RAPIDAPI_HOST
            }
        });

        if(!res.ok){
            throw new Error(`Error ${res.status}`);
        }

        const data = await res.json();

        let arrivals = data.arrivals || data;

        flightsContainer.innerHTML = `<pre>${JSON.stringify(arrivals.slice(0,10), null, 2)}</pre>`;

        apiStatus.textContent = '✅ Datos cargados';

    }catch(e){
        apiStatus.textContent = '❌ ' + e.message;
    }
}

testBtn.addEventListener('click', testApi);
loadBtn.addEventListener('click', loadFlights);

})();
</script>

</body>
</html>
