<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Taxi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h1 { color: #333; }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* --- ESTILOS DEL TAXÍMETRO --- */
        .taximetro-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 20px;
            width: 100%;
        }

        .taximetro-bg {
            width: 100%;
            display: block;
            border-radius: 5px;
        }

        /* El contenedor del número sobre la pantalla */
        #precio-display {
            position: absolute;
            /* Ajusta estos valores para que el número caiga justo en el hueco de tu imagen */
            top: 42%; 
            left: 50%;
            transform: translate(-50%, -50%);
            
            font-family: 'Orbitron', sans-serif;
            color: #ff0000; /* Rojo digital */
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
            letter-spacing: 2px;
            pointer-events: none; /* Para que no interfiera al hacer clic */
        }

        button {
            background-color: #ffcc00;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
            width: 100%;
        }

        button:hover {
            background-color: #e6b800;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora de Precios</h1>
    
    <label for="distancia">Distancia (km):</label>
    <input type="number" id="distancia" placeholder="Ej: 5.5" step="0.1">

    <label for="tarifa">Tipo de Tarifa:</label>
    <select id="tarifa">
        <option value="1.20">Tarifa 1 (Día)</option>
        <option value="1.50">Tarifa 2 (Noche/Festivo)</option>
    </select>

    <button onclick="calcularPrecio()">CALCULAR TARIFA</button>

    <div class="taximetro-wrapper">
        <img src="taximetro_vacio.png" alt="Taxímetro" class="taximetro-bg">
        
        <div id="precio-display">0.00</div>
    </div>
</div>

<script>
    function calcularPrecio() {
        // Obtenemos los valores de los inputs
        const km = parseFloat(document.getElementById('distancia').value);
        const tarifa = parseFloat(document.getElementById('tarifa').value);
        const bajadaBandera = 2.50; // Ejemplo de precio mínimo inicial

        if (isNaN(km) || km <= 0) {
            alert("Por favor, introduce una distancia válida.");
            return;
        }

        // Cálculo simple
        let total = bajadaBandera + (km * tarifa);

        // Actualizamos el número dentro de la imagen
        // Usamos toFixed(2) para mostrar siempre 2 decimales
        document.getElementById('precio-display').innerText = total.toFixed(2);
    }
</script>

</body>
</html>
